name: acadexa
description: "Academic advising system"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Networking
  dio: ^5.4.3+1
  http: ^1.2.0

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # File picking
  file_picker: ^8.0.0+1

  # State management
  provider: ^6.1.2

  # Path
  path_provider: ^2.1.3
  path: ^1.9.0
  get_it: ^7.6.4
  flutter_bloc: ^8.1.4

  # Utilities
  equatable: ^2.0.5
  intl: ^0.20.2              # ✅ غيري من 0.19.0 إلى 0.20.2
  
  # User interface
  google_fonts: ^6.2.1 

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  hive_generator: ^2.0.1
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/fonts/